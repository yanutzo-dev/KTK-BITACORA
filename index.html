<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitácora KTK</title>
<style>
:root{
  --terra:#C4622D;--terra-p:#F5E6DC;--terra-d:#a84e22;
  --sage:#7A9E87;--sage-p:#e8f2ec;
  --crema:#FAF7F2;--carbon:#2E2A25;--carbon-2:#4a443d;
  --muted:#8a8278;--border:#e0d9d0;--border-l:#ede7df;--white:#fff;
  --avance-bg:#eaf3e0;--avance-fg:#3a6e10;
  --problema-bg:#fceaea;--problema-fg:#a32d2d;
  --acuerdo-bg:#e6f1fb;--acuerdo-fg:#185fa5;
  --pendiente-bg:#faeeda;--pendiente-fg:#854f0b;
  --arch-bg:#f4f2ee;--arch-fg:#8a8278;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{background:var(--crema);color:var(--carbon);font-family:'Calibri','Segoe UI',Arial,sans-serif;min-height:100vh}
.page{max-width:900px;margin:0 auto;padding:2.5rem 1.5rem 4rem}

.site-header{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:1.25rem;margin-bottom:0}
.site-header h1{font-family:'Georgia',serif;font-size:1.6rem;font-weight:normal}
.site-header h1 span{color:var(--terra)}
.header-actions{display:flex;gap:8px}

.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:2rem}
.tab{font-family:inherit;font-size:14px;padding:10px 18px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;margin-bottom:-1px;transition:color .15s,border-color .15s;white-space:nowrap}
.tab:hover{color:var(--carbon)}
.tab.active{color:var(--terra);border-bottom-color:var(--terra);font-weight:500}
.tab-badge{display:inline-block;background:var(--pendiente-bg);color:var(--pendiente-fg);font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;margin-left:5px;vertical-align:middle}

.panel{display:none}.panel.active{display:block}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--border);background:var(--white);color:var(--carbon-2);font-family:inherit;font-size:13px;padding:5px 12px;border-radius:4px;cursor:pointer;transition:background .12s,border-color .12s}
.btn:hover{background:var(--crema);border-color:var(--terra)}
.btn-primary{background:var(--terra);color:#fff;border-color:var(--terra);font-weight:500}
.btn-primary:hover{background:var(--terra-d);border-color:var(--terra-d)}
.btn-primary:disabled{background:#c8a898;border-color:#c8a898;cursor:not-allowed}
.btn-sage{background:var(--sage);color:#fff;border-color:var(--sage);font-size:12px;padding:3px 9px}
.btn-sage:hover{background:#658a73;border-color:#658a73}
.btn-sm{font-size:12px;padding:3px 9px}

/* Input */
.input-card{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:1.5rem;margin-bottom:1.5rem}
.input-card h2{font-family:'Georgia',serif;font-size:1rem;font-weight:normal;color:var(--terra);margin-bottom:1rem}
.raw-input{width:100%;min-height:86px;font-family:inherit;font-size:14px;color:var(--carbon);border:1px solid var(--border);border-radius:4px;padding:9px 11px;resize:vertical;background:var(--crema);line-height:1.55;transition:border-color .12s}
.raw-input:focus{outline:none;border-color:var(--terra);box-shadow:0 0 0 2px var(--terra-p)}
.input-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;flex-wrap:wrap;gap:8px}
.char-hint{font-size:12px;color:var(--muted)}
.btn-mic{background:var(--white);border:1px solid var(--border);color:var(--muted);font-family:inherit;font-size:18px;width:38px;height:38px;border-radius:50%;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.btn-mic:hover{border-color:var(--terra);color:var(--terra)}
.btn-mic.recording{background:#fceaea;border-color:#c93b3b;color:#c93b3b;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(201,59,59,.3)}50%{box-shadow:0 0 0 6px rgba(201,59,59,0)}}

/* Preview – múltiples sub-entradas */
.preview-wrap{background:#f0f4ff;border:1px solid #c5d3f0;border-radius:6px;padding:1.25rem;margin-bottom:1.5rem;display:none}
.preview-wrap h3{font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:#3050a0;margin-bottom:1rem}
.sub-entry-preview{background:var(--white);border:1px solid var(--border-l);border-radius:5px;padding:1rem;margin-bottom:10px}
.sub-entry-preview:last-of-type{margin-bottom:14px}
.sep-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.pfield{display:flex;flex-direction:column;gap:3px}
.pfield label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.pfield select,.pfield input{font-family:inherit;font-size:13px;padding:5px 8px;border:1px solid var(--border);border-radius:4px;background:var(--white);color:var(--carbon)}
.pfield select:focus,.pfield input:focus{outline:none;border-color:var(--terra)}
.pfield-full{grid-column:1/-1}
.nota-preview{width:100%;min-height:60px;font-family:inherit;font-size:14px;color:var(--carbon);border:1px solid var(--border);border-radius:4px;padding:7px 9px;resize:vertical;background:var(--white);line-height:1.5}
.nota-preview:focus{outline:none;border-color:var(--terra)}
/* personas en preview */
.personas-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:6px}
.personas-row label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-right:2px}
.persona-chip-input{font-family:inherit;font-size:13px;padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:var(--white);color:var(--carbon);width:140px}
.persona-chip-input:focus{outline:none;border-color:var(--sage)}
.preview-actions{display:flex;gap:8px;justify-content:flex-end}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:9px;margin-bottom:1.25rem;flex-wrap:wrap}
.toolbar label{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.toolbar select{font-family:inherit;font-size:13px;padding:5px 8px;border:1px solid var(--border);border-radius:4px;background:var(--white);color:var(--carbon)}
.toolbar select:focus{outline:none;border-color:var(--terra)}
.entry-count{margin-left:auto;font-size:13px;color:var(--muted)}
.show-arch{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;cursor:pointer}

/* Timeline */
.timeline{position:relative}
.timeline::before{content:'';position:absolute;left:24px;top:8px;bottom:8px;width:1px;background:var(--border)}
.entry{display:flex;gap:15px;margin-bottom:11px;opacity:1;transition:opacity .2s}
.entry.archived{opacity:.55}
.entry-marker{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:48px;padding-top:2px}
.dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--white);flex-shrink:0;position:relative;z-index:1}
.dot-avance{background:#4a8f1a}.dot-problema{background:#c93b3b}
.dot-acuerdo{background:#2077cc}.dot-pendiente{background:#c8810a}
.dot-archivado{background:#bbb}
.entry-time{font-size:10px;color:var(--muted);text-align:center;line-height:1.4;white-space:nowrap}

.entry-card{flex:1;background:var(--white);border:1px solid var(--border-l);border-radius:6px;padding:.8rem 1rem;min-width:0}
.entry.archived .entry-card{background:var(--arch-bg);border-color:var(--border)}
.entry-header{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:5px}
.tag-proyecto{font-size:12px;font-weight:600;color:var(--terra);background:var(--terra-p);padding:2px 8px;border-radius:3px}
.tag-tipo{font-size:11px;padding:2px 7px;border-radius:3px;font-weight:500}
.tag-tipo.avance{background:var(--avance-bg);color:var(--avance-fg)}
.tag-tipo.problema{background:var(--problema-bg);color:var(--problema-fg)}
.tag-tipo.acuerdo{background:var(--acuerdo-bg);color:var(--acuerdo-fg)}
.tag-tipo.pendiente{background:var(--pendiente-bg);color:var(--pendiente-fg)}
.tag-tipo.archivado{background:var(--arch-bg);color:var(--arch-fg)}
.tag-arch-badge{font-size:10px;color:var(--muted);font-style:italic}
.entry-note{font-size:13.5px;color:var(--carbon);line-height:1.5;margin-bottom:7px}
.entry-footer{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
/* persona buttons */
.persona-btn{font-size:11px;padding:2px 9px;border-radius:3px;border:1px solid var(--sage);background:var(--sage-p);color:#3d6b4f;font-family:inherit;cursor:default;font-weight:500}
/* action buttons */
.entry-actions{margin-left:auto;display:flex;gap:4px}
.btn-arch{background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:2px 8px;border-radius:3px;cursor:pointer;font-family:inherit;transition:background .12s}
.btn-arch:hover{background:var(--arch-bg);border-color:var(--muted)}
.btn-del-sm{background:none;border:none;cursor:pointer;color:var(--border);font-size:16px;line-height:1;padding:0 3px;transition:color .12s}
.btn-del-sm:hover{color:var(--problema-fg)}

/* ── Tareas tab ── */
.tareas-toolbar{display:flex;align-items:center;gap:9px;margin-bottom:1.25rem;flex-wrap:wrap}
.tareas-toolbar label{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.tareas-toolbar select{font-family:inherit;font-size:13px;padding:5px 8px;border:1px solid var(--border);border-radius:4px;background:var(--white);color:var(--carbon)}
.tarea-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--white);border:1px solid var(--border-l);border-radius:5px;margin-bottom:8px}
.tarea-row.done{opacity:.5}
.tarea-check{width:16px;height:16px;accent-color:var(--terra);margin-top:2px;cursor:pointer;flex-shrink:0}
.tarea-body{flex:1;min-width:0}
.tarea-texto{font-size:13.5px;color:var(--carbon);line-height:1.45}
.tarea-row.done .tarea-texto{text-decoration:line-through;color:var(--muted)}
.tarea-meta{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.tarea-persona{font-size:11px;padding:1px 8px;border-radius:3px;border:1px solid var(--sage);background:var(--sage-p);color:#3d6b4f;font-weight:500}

/* Project color chips */
.pc-0{background:#F5E6DC;color:#8a3a10;border-color:#e0b89a}
.pc-1{background:#e6f1fb;color:#185fa5;border-color:#a8cef0}
.pc-2{background:#eaf3e0;color:#3a6e10;border-color:#a8d48a}
.pc-3{background:#faeeda;color:#854f0b;border-color:#e8c87a}
.pc-4{background:#f0e8fb;color:#5a2d82;border-color:#c9a8e8}
.pc-5{background:#fceaea;color:#a32d2d;border-color:#e8aaaa}
.pc-6{background:#e8f6f4;color:#1a6b5f;border-color:#8ad4cc}
.pc-7{background:#fff0e0;color:#8a4a00;border-color:#e8c090}
.pc-8{background:#e8eaf6;color:#2d3a8a;border-color:#a8b0e8}
.pc-9{background:#fce8f4;color:#8a1a5a;border-color:#e8a8d0}
.pc-10{background:#f0f4e0;color:#4a6a10;border-color:#c0d48a}
.pc-11{background:#e8f0f8;color:#1a4a7a;border-color:#90b8e0}
.tarea-del{background:none;border:none;cursor:pointer;color:var(--border);font-size:15px;padding:0 2px;transition:color .12s;flex-shrink:0}
.tarea-del:hover{color:var(--problema-fg)}

/* ── Resumen tab ── */
.resumen-toolbar{display:flex;align-items:center;gap:9px;margin-bottom:1.5rem;flex-wrap:wrap}
.resumen-toolbar label{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.resumen-toolbar select{font-family:inherit;font-size:13px;padding:5px 8px;border:1px solid var(--border);border-radius:4px;background:var(--white);color:var(--carbon)}
.dia-block{margin-bottom:2rem}
.dia-header{display:flex;align-items:baseline;gap:12px;margin-bottom:1rem;padding-bottom:8px;border-bottom:1px solid var(--border)}
.dia-fecha{font-family:'Georgia',serif;font-size:1.05rem;font-weight:normal}
.dia-fecha span{color:var(--terra)}
.dia-count{font-size:12px;color:var(--muted)}
.proyecto-block{margin-bottom:1rem;background:var(--white);border:1px solid var(--border-l);border-radius:6px;overflow:hidden}
.proyecto-block-header{display:flex;align-items:center;gap:10px;padding:9px 13px;border-bottom:1px solid var(--border-l);background:var(--crema)}
.proyecto-name{font-size:13px;font-weight:600;color:var(--terra)}
.proyecto-entry-count{font-size:11px;color:var(--muted);margin-left:auto}
.resumen-row{display:flex;align-items:flex-start;gap:9px;padding:9px 13px;border-bottom:.5px solid var(--border-l)}
.resumen-row:last-child{border-bottom:none}
.resumen-time{font-size:11px;color:var(--muted);white-space:nowrap;min-width:36px;padding-top:2px}
.resumen-tipo{font-size:11px;padding:2px 7px;border-radius:3px;font-weight:500;white-space:nowrap;flex-shrink:0}
.resumen-tipo.avance{background:var(--avance-bg);color:var(--avance-fg)}
.resumen-tipo.problema{background:var(--problema-bg);color:var(--problema-fg)}
.resumen-tipo.acuerdo{background:var(--acuerdo-bg);color:var(--acuerdo-fg)}
.resumen-tipo.pendiente{background:var(--pendiente-bg);color:var(--pendiente-fg)}
.resumen-nota{font-size:13px;color:var(--carbon);line-height:1.45;flex:1}
.resumen-personas{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px}

/* Spinner, empty, toast */
.spinner{width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty p{font-size:14px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--carbon);color:#fff;font-size:13px;padding:10px 18px;border-radius:4px;opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s;pointer-events:none;z-index:99}
.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:600px){.sep-grid{grid-template-columns:1fr}.site-header{flex-direction:column;gap:10px;align-items:flex-start}}
</style>
</head>
<body>
<div class="page">

<header class="site-header">
  <h1>Bitácora <span>KTK</span></h1>
  <div class="header-actions">
    <button class="btn" onclick="exportData()">&#8595; Exportar</button>
    <label class="btn" style="cursor:pointer">&#8593; Importar<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
    <button class="btn" id="btn-apikey" onclick="toggleApiKey()" title="Configurar API Key">&#9881;</button>
  </div>
  <div id="apikey-panel" style="display:none;background:#f0f4ff;border:1px solid #c5d3f0;border-radius:6px;padding:1rem;margin-top:1rem">
    <div style="font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:#3050a0;margin-bottom:8px">API Key de Anthropic</div>
    <div style="display:flex;gap:8px;align-items:center">
      <input type="password" id="apikey-input" placeholder="sk-ant-api03-..." style="flex:1;font-family:inherit;font-size:13px;padding:6px 10px;border:1px solid #c5d3f0;border-radius:4px;background:#fff;color:#2E2A25" value="">
      <button class="btn btn-primary" onclick="saveApiKey()">Guardar</button>
      <button class="btn" onclick="toggleApiKey()">Cerrar</button>
    </div>
    <div style="font-size:11px;color:#8a8278;margin-top:6px">Se guarda solo en tu navegador, nunca en el código.</div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('bitacora',this)">Bitácora</button>
  <button class="tab" onclick="switchTab('tareas',this)">Tareas <span class="tab-badge" id="badge-tareas">0</span></button>
  <button class="tab" onclick="switchTab('resumen',this)">Resumen por día</button>
</div>

<!-- ══ PANEL: BITÁCORA ══ -->
<div id="panel-bitacora" class="panel active">

  <div class="input-card">
    <h2>¿Qué pasó hoy?</h2>
    <textarea class="raw-input" id="raw-input" placeholder="Escribe en lenguaje natural. Si hay varios temas o proyectos, la IA los divide automáticamente.&#10;&#10;Ej: RE: DIESEL MIDTOWN — Arturo compartió cotización colgadores. Pendiente revisar con Minerva tema eléctrico. Avance en Cancún: se terminó piso."></textarea>
    <div class="input-footer">
      <span class="char-hint">La IA limpia el texto, divide temas y detecta tareas — tú confirmas antes de guardar.</span>
      <button class="btn btn-primary" id="btn-procesar" onclick="procesarNota()">&#9654; Procesar con IA</button>
    </div>
  </div>

  <div class="preview-wrap" id="preview-wrap">
    <h3>Revisa y confirma</h3>
    <div id="preview-subs"></div>
    <div class="preview-actions">
      <button class="btn" onclick="cancelarPreview()">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarTodas()">Guardar todo</button>
    </div>
  </div>

  <div class="toolbar">
    <label>Proyecto:</label>
    <select id="filter-proyecto" onchange="render()"><option value="">Todos</option></select>
    <label>Tipo:</label>
    <select id="filter-tipo" onchange="render()">
      <option value="">Todos</option>
      <option value="avance">Avance</option>
      <option value="problema">Problema</option>
      <option value="acuerdo">Acuerdo</option>
      <option value="pendiente">Pendiente</option>
    </select>
    <label class="show-arch">
      <input type="checkbox" id="show-arch" onchange="render()"> Ver archivados
    </label>
    <span id="entry-count" class="entry-count"></span>
  </div>

  <div class="timeline" id="feed"></div>
</div>

<!-- ══ PANEL: TAREAS ══ -->
<div id="panel-tareas" class="panel">
  <div class="tareas-toolbar">
    <label>Proyecto:</label>
    <select id="t-filter-proyecto" onchange="renderTareas()"><option value="">Todos</option></select>
    <label>
      <input type="checkbox" id="t-show-done" onchange="renderTareas()"> Ver completadas
    </label>
    <span id="t-count" class="entry-count"></span>
  </div>
  <div id="tareas-feed"></div>
</div>

<!-- ══ PANEL: RESUMEN ══ -->
<div id="panel-resumen" class="panel">
  <div class="resumen-toolbar">
    <label>Mostrar:</label>
    <select id="res-filtro-dias" onchange="renderResumen()">
      <option value="0">Todos los días</option>
      <option value="7">Últimos 7 días</option>
      <option value="30">Últimos 30 días</option>
    </select>
    <label>Proyecto:</label>
    <select id="res-filtro-proyecto" onchange="renderResumen()"><option value="">Todos</option></select>
    <button class="btn" style="margin-left:auto" onclick="exportarPDF()">&#8595; Exportar PDF</button>
  </div>
  <div id="resumen-feed"></div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
const STORE_KEY='ktk_bitacora_v4';
const TAREAS_KEY='ktk_tareas_v4';
let entries=[];
let tareas=[];
try{entries=JSON.parse(localStorage.getItem(STORE_KEY)||'[]');}catch(e){}
try{tareas=JSON.parse(localStorage.getItem(TAREAS_KEY)||'[]');}catch(e){}

function save(){localStorage.setItem(STORE_KEY,JSON.stringify(entries));}
function saveTareas(){localStorage.setItem(TAREAS_KEY,JSON.stringify(tareas));}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function nowLocal(){
  const d=new Date(),p=n=>String(n).padStart(2,'0');
  return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}

// ── Tabs ──
function switchTab(name,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='resumen'){syncResumenOptions();renderResumen();}
  if(name==='tareas'){syncTareasOptions();renderTareas();}
}

// ── AI ──
async function procesarNota(){
  const raw=document.getElementById('raw-input').value.trim();
  if(!raw){toast('Escribe algo primero.');return;}
  if(!checkApiKey())return;
  const btn=document.getElementById('btn-procesar');
  btn.innerHTML='<span class="spinner"></span> Procesando\u2026';
  btn.disabled=true;

  const safeRaw=raw.replace(/\\/g,"\\\\").replace(/"/g,"\\\"").replace(/`/g,"'").replace(/\n/g," ").replace(/\r/g,"");
  const prompt=`Eres el asistente de bitácora de KTK, empresa de diseño y construcción de interiores retail en México.

TAREA: Procesa el texto de un PM y devuelve entradas estructuradas.

REGLAS IMPORTANTES:
1. Mejora MÍNIMAMENTE la redacción: corrige ortografía y puntuación, pero CONSERVA el mismo lenguaje y nivel de detalle del original. NO agregues información que no está en el texto. NO hagas el texto más largo ni más formal de lo que es.
2. DIVISIÓN en sub-entradas — divide en estos casos:
   a) Si el texto tiene puntos numerados (1. 2. 3.) o lista con guiones/bullets: CADA PUNTO = UNA SUB-ENTRADA separada, aunque sean del mismo proyecto.
   b) Si el texto menciona varios proyectos o temas distintos sin numeración: divide por proyecto/tema.
   c) Si es un solo tema continuo sin lista: una sola entrada.
3. Cuando divides una lista numerada, el proyecto y responsable se heredan del contexto general para todas las sub-entradas.
4. Si detectas una tarea o acción pendiente con persona específica (ej: "revisar con Minerva", "confirmar con Arturo"), extráela como tarea separada.
5. Para cada sub-entrada, infiere el tipo: avance=progreso realizado, problema=falla o bloqueo, acuerdo=decisión tomada, pendiente=tarea por hacer.

// Preview con sub-entradas editables
let previewData=null;
function buildPreview(parsed){
  previewData=parsed;
  const container=document.getElementById('preview-subs');
  const tipos=['avance','problema','acuerdo','pendiente'];
  const equipo=['Juan','Dulce','Paola','Nacho','Fanny','Minerva'];

  container.innerHTML=(parsed.entradas||[]).map((e,i)=>`
    <div class="sub-entry-preview" data-idx="${i}">
      <div class="sep-grid">
        <div class="pfield">
          <label>Proyecto</label>
          <input type="text" class="pe-proyecto" value="${esc(e.proyecto||'')}" placeholder="Proyecto">
        </div>
        <div class="pfield">
          <label>Tipo</label>
          <select class="pe-tipo">
            ${tipos.map(t=>`<option value="${t}"${e.tipo===t?' selected':''}>${t}</option>`).join('')}

        </div>
        <div class="pfield">
          <label>Responsable</label>

          </select>
        </div>
        <div class="pfield">
          <label>Fecha y hora</label>
          <input type="datetime-local" class="pe-fecha" value="${nowLocal()}">
        </div>
        <div class="pfield pfield-full">
          <label>Nota</label>
          <textarea class="nota-preview pe-nota">${esc(e.nota||'')}</textarea>
        </div>
      </div>
      <div class="personas-row">
        <label>Personas a tratar:</label>
        <input type="text" class="persona-chip-input pe-personas" value="${esc((e.personas||[]).join(', '))}" placeholder="Ej: Minerva, Arturo">
      </div>
    </div>`).join('')+
    ((parsed.tareas&&parsed.tareas.length)?`<div style="background:var(--pendiente-bg);border-radius:4px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:var(--pendiente-fg)">
      <strong>Tareas detectadas que se agregarán:</strong><br>
      ${parsed.tareas.map(t=>`• ${esc(t.texto)}${t.persona?` — <em>${esc(t.persona)}</em>`:''} <span style="color:var(--muted)">(${esc(t.proyecto||'')})</span>`).join('<br>')}

function cancelarPreview(){
  document.getElementById('preview-wrap').style.display='none';
  previewData=null;
}

function confirmarTodas(){
  const subs=document.querySelectorAll('.sub-entry-preview');
  subs.forEach(sub=>{
    const proyecto=sub.querySelector('.pe-proyecto').value.trim();
    const nota=sub.querySelector('.pe-nota').value.trim();
    if(!proyecto||!nota)return;
    const personasRaw=sub.querySelector('.pe-personas').value.trim();
    const personas=personasRaw?personasRaw.split(',').map(p=>p.trim()).filter(Boolean):[];
    entries.unshift({
      id:Date.now()+Math.random(),
      proyecto,
      tipo:sub.querySelector('.pe-tipo').value,
      responsable:sub.querySelector('.pe-resp').value,
      fecha:sub.querySelector('.pe-fecha').value,
      nota,
      personas,
      archivado:false
    });
  });
  // agregar tareas detectadas
  if(previewData&&previewData.tareas){
    previewData.tareas.forEach(t=>{
      tareas.unshift({
        id:Date.now()+Math.random(),
        texto:t.texto||'',
        proyecto:t.proyecto||'',
        persona:t.persona||'',
        done:false,
        fecha:nowLocal()
      });
    });
    saveTareas();
  }
  save();syncFilterOptions();syncTareasOptions();initProjectColors();render();updateBadge();
  document.getElementById('preview-wrap').style.display='none';
  document.getElementById('raw-input').value='';
  previewData=null;
  toast('Guardado.');
}

// ── Entries: archivar / borrar ──
function archivarEntry(id){
  const e=entries.find(e=>e.id===id);
  if(!e)return;
  e.archivado=!e.archivado;
  save();render();
  toast(e.archivado?'Entrada archivada.':'Entrada restaurada.');
}
function deleteEntry(id){
  if(!confirm('¿Eliminar esta entrada definitivamente?'))return;
  entries=entries.filter(e=>e.id!==id);
  save();syncFilterOptions();render();
}

// ── Tareas ──
function toggleTarea(id){
  const t=tareas.find(t=>t.id===id);
  if(t){t.done=!t.done;saveTareas();renderTareas();updateBadge();}
}
function deleteTarea(id){
  tareas=tareas.filter(t=>t.id!==id);
  saveTareas();renderTareas();updateBadge();
}
function updateBadge(){
  const n=tareas.filter(t=>!t.done).length;
  const b=document.getElementById('badge-tareas');
  b.textContent=n;
  b.style.display=n>0?'inline-block':'none';
}

function syncFilterOptions(){
  const fp=document.getElementById('filter-proyecto');

// ── Project colors ──
const _pcMap={};let _pcIdx=0;
const _PC=['#F5E6DC|#7a3010|#d9a882','#e6f1fb|#185fa5|#9ac0ea','#eaf3e0|#3a6e10|#9ecb78','#faeeda|#854f0b|#dbb85a','#f0e8fb|#5a2d82|#c0a0e0','#fce8f4|#8a1a5a|#dda0c8','#e8f6f4|#1a6b5f|#7accc4','#fff0e0|#8a4a00|#ddb878','#e8eaf6|#2d3a8a|#9aa4d8','#f4f0e8|#5a4a20|#c8b888','#edf8e0|#2a5a18|#90c870','#e8f0f8|#1a4a7a|#88b0d8'];
function pcStyle(p){
  if(!_pcMap[p]){_pcMap[p]=_PC[_pcIdx%_PC.length];_pcIdx++;}
  const[bg,fg,bc]=_pcMap[p].split('|');
  return'background:'+bg+';color:'+fg+';border:1px solid '+bc+';';
}

function initProjectColors(){
  [...new Set(entries.map(e=>e.proyecto).concat(tareas.map(t=>t.proyecto)).filter(Boolean))].sort().forEach(p=>pcStyle(p));
}
// ── Date helpers ──
function dateKey(str){return str?str.slice(0,10):'';}
function fmtFechaDia(str){
  if(!str)return{dia:'',fecha:''};
  const[y,m,d]=str.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  const dias=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return{dia:dias[dt.getDay()],fecha:`${d} de ${meses[m-1]} de ${y}`};
}
function fmtHora(str){if(!str||!str.includes('T'))return'';return str.split('T')[1].slice(0,5);}
function fmtFecha(str){
  if(!str)return['',''];
  const d=new Date(str);
  const dias=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const p=n=>String(n).padStart(2,'0');
  return[`${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]}`,`${p(d.getHours())}:${p(d.getMinutes())}`];
}

// ── Render bitácora ──
function render(){
  const fp=document.getElementById('filter-proyecto').value;
  const ft=document.getElementById('filter-tipo').value;
  const showArch=document.getElementById('show-arch').checked;
  let filtered=entries.filter(e=>(!fp||e.proyecto===fp)&&(!ft||e.tipo===ft));
  if(!showArch)filtered=filtered.filter(e=>!e.archivado);
  document.getElementById('entry-count').textContent=`${filtered.length} entrada${filtered.length!==1?'s':''}`;
  const feed=document.getElementById('feed');
  if(!filtered.length){feed.innerHTML='<div class="empty"><p>Sin entradas. Escribe tu primera nota arriba.</p></div>';return;}
  feed.innerHTML=filtered.map(e=>{
    const[d,t]=fmtFecha(e.fecha);
    const archivado=!!e.archivado;
    const tipoLabel=archivado?'archivado':e.tipo;
    const dotClass=archivado?'dot-archivado':'dot-'+e.tipo;
    const personasHTML=(e.personas&&e.personas.length)?
      e.personas.map(p=>`<span class="persona-btn">${esc(p)}</span>`).join(''):'';
    return`<div class="entry${archivado?' archived':''}">
      <div class="entry-marker"><div class="dot ${dotClass}"></div><div class="entry-time">${d}<br>${t}</div></div>
      <div class="entry-card">
        <div class="entry-header">
          <span style="${pcStyle(e.proyecto)};font-size:12px;font-weight:600;padding:2px 8px;border-radius:3px;">${esc(e.proyecto)}</span>
          <span class="tag-tipo ${tipoLabel}">${tipoLabel}</span>
          ${archivado?'<span class="tag-arch-badge">archivado</span>':''}
        </div>
        <div class="entry-note">${esc(e.nota).replace(/\n/g,'<br>')}</div>
        <div class="entry-footer">
          ${personasHTML}
          <div class="entry-actions">
            <button class="btn-arch" onclick="archivarEntry(${JSON.stringify(e.id)})">${archivado?'Restaurar':'Archivar'}</button>
            <button class="btn-del-sm" onclick="deleteEntry(${JSON.stringify(e.id)})" title="Eliminar definitivo">&times;</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Render tareas ──
function renderTareas(){
  const fp=document.getElementById('t-filter-proyecto').value;
  const showDone=document.getElementById('t-show-done').checked;
  let filtered=tareas.filter(t=>(!fp||t.proyecto===fp));
  if(!showDone)filtered=filtered.filter(t=>!t.done);
  const pending=tareas.filter(t=>!t.done).length;
  document.getElementById('t-count').textContent=`${pending} pendiente${pending!==1?'s':''}`;
  const feed=document.getElementById('tareas-feed');
  if(!filtered.length){feed.innerHTML='<div class="empty"><p>Sin tareas pendientes.</p></div>';return;}
  feed.innerHTML=filtered.map(t=>`
    <div class="tarea-row${t.done?' done':''}">
      <input type="checkbox" class="tarea-check" ${t.done?'checked':''} onchange="toggleTarea(${JSON.stringify(t.id)})">
      <div class="tarea-body">
        <div class="tarea-texto">${esc(t.texto)}</div>
        <div class="tarea-meta">
          ${t.proyecto?`<span style="${pcStyle(t.proyecto)};font-size:11px;font-weight:600;padding:1px 7px;border-radius:3px;">${esc(t.proyecto)}</span>`:''}
          ${t.persona?`<span class="tarea-persona">${esc(t.persona)}</span>`:''}
          ${t.fecha?`<span>${fmtHora(t.fecha)}</span>`:''}
        </div>
      </div>
      <button class="tarea-del" onclick="deleteTarea(${JSON.stringify(t.id)})" title="Eliminar">&times;</button>
    </div>`).join('');
}

function renderResumen(){
  const nDias=parseInt(document.getElementById('res-filtro-dias').value)||0;
  const filtroP=document.getElementById('res-filtro-proyecto').value;
  const ahora=new Date();
  let filtered=entries.filter(e=>!e.archivado);
  if(nDias>0){const desde=new Date(ahora);desde.setDate(desde.getDate()-nDias);filtered=filtered.filter(e=>e.fecha&&new Date(e.fecha)>=desde);}
  if(filtroP)filtered=filtered.filter(e=>e.proyecto===filtroP);
  const porDia={};

  const dias=Object.keys(porDia).sort((a,b)=>b.localeCompare(a));

    const nProy=Object.keys(porP).length;

// ── Import / Export ──
function exportData(){
  const blob=new Blob([JSON.stringify({entries,tareas},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`KTK_Bitacora_${new Date().toISOString().slice(0,10)}.json`;
  a.click();toast('Archivo exportado.');
}
function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      // acepta formato v4 {entries,tareas} o legacy array
      const newEntries=Array.isArray(data)?data:(data.entries||[]);
      const newTareas=Array.isArray(data)?[]:(data.tareas||[]);
      const exE=new Set(entries.map(e=>String(e.id)));
      const exT=new Set(tareas.map(t=>String(t.id)));
      const addE=newEntries.filter(e=>!exE.has(String(e.id)));
      const addT=newTareas.filter(t=>!exT.has(String(t.id)));
      entries=[...entries,...addE].sort((a,b)=>b.id-a.id);
      tareas=[...tareas,...addT].sort((a,b)=>b.id-a.id);
      save();saveTareas();syncFilterOptions();syncTareasOptions();initProjectColors();render();updateBadge();
      toast(`${addE.length} entradas y ${addT.length} tareas importadas.`);
    }catch{toast('Archivo inválido.');}
  };
  reader.readAsText(file);e.target.value='';
}
